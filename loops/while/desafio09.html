<script>

  let senha = prompt("Digite a senha:");

  while (senha !== "1234") {
    alert("Senha incorreta! Tente novamente.");
    senha = prompt("Digite a senha:");
  }

  alert("Senha correta! Bem-vindo.");
</script>
