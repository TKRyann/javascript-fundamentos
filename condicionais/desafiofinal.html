<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio Final Js</title>
</head>

<body>
  <H1>DESAFIO FINAL JS</H1>
  <h2>Crie um programa de login.</h2>
  <p>Dados corretos: <br>

    Usuário: admin <br>
    Senha: 1234
    <br>
    Se errar:

    Usuário ou senha incorretos.
    <br>

    Se acertar:

    Bem-vindo ao sistema!

    Depois pergunte:

    Deseja sair? (sim/não)

    E responda de acordo com a escolha.
  </p>
</body>
<script>

  let usuario = prompt('Digite seu usuário:');
  let senha = prompt('Digite sua senha:');

  if (usuario === 'admin' && senha === '1234') {
    alert('Bem-vindo ao sistema!');

    let sair = prompt('Deseja sair? (sim/não)');

    if (sair === 'sim') {
      alert('Você saiu do sistema.');
    } else {
      alert('Você continua no sistema.');
    }

  } else {
    alert('Usuário ou senha incorretos.');
  }

</script>

</html>
